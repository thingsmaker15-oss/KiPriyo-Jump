<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiPriyo Jumper - Character Select</title>
    <style>
        /* --- CSS for Styling --- */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50; 
            overflow: hidden;
            font-family: sans-serif;
        }

        #game-container {
            width: 800px;
            height: 400px;
            position: relative;
            background-image: url('bg.png'); 
            background-color: #87CEEB; 
            background-size: cover;
            background-position: bottom;
            border-bottom: 20px solid #4a4a4a; 
            overflow: hidden;
        }

        /* --- HOME SCREEN OVERLAY --- */
        #home-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #home-screen h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #f1c40f;
            text-shadow: 2px 2px 0 #000;
        }

        .char-btn {
            padding: 15px 30px;
            margin: 15px;
            font-size: 1.2em;
            cursor: pointer;
            background-color: #f1c40f;
            color: black;
            border: 4px solid white;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .char-btn:hover {
            transform: scale(1.1);
            background-color: #f39c12;
        }

        /* --- GAME OBJECTS --- */
        #player {
            width: 32px;
            height: 64px; 
            position: absolute;
            bottom: 20px; 
            left: 50px;
            z-index: 10;
            background-size: contain;
            background-repeat: no-repeat;
            transition: transform 0.1s; 
        }

        #enemy {
            width: 40px;
            height: 40px; 
            position: absolute;
            bottom: 20px;
            left: 750px;
            z-index: 9;
            background-image: url('notebook.png'); 
            background-color: transparent; 
            background-size: contain;
            background-repeat: no-repeat;
        }

        #enemy::before {
            content: '📚';
            font-size: 30px;
            position: absolute;
            top: 5px; left: 5px;
        }

        .block {
            width: 40px;
            height: 40px;
            position: absolute;
            background-image: url('brick.png'); 
            background-color: #a0522d; 
            background-size: cover;
            border: 2px solid #6b4329;
            box-shadow: 2px 2px 0 #6b4329;
        }

        .coin {
            width: 20px;
            height: 20px;
            position: absolute;
            background-color: gold;
            border-radius: 50%;
            border: 2px solid orange;
            text-align: center;
            line-height: 20px;
            font-size: 10px;
            font-weight: bold;
            color: #d1a700;
        }

        /* --- BASE CLASSES --- */
        .platform {
            height: 30px; 
            position: absolute;
            background-size: cover; 
            border: 2px solid #6b4329;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .prop {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 5; 
        }

        /* --- RANDOM DECORATIVE OBSTACLES --- */
        .obstacle {
            position: absolute;
            bottom: 20px; 
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 8;
        }

        .obs-pot {
            width: 30px;
            height: 30px;
            background-image: url('pot.png');
        }

        .obs-statue {
            width: 40px;
            height: 60px;
            background-image: url('statue.png');
        }

        /* --- MODIFIER CLASSES --- */
        .platform-1 { background-image: url('platform_1.png'); }
        .platform-2 { background-image: url('platform_2.png'); }
        .pillar-1 { background-image: url('pillar_1.png'); }
        .pillar-2 { background-image: url('pillar_2.png'); }
        
        #score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            text-shadow: 1px 1px 0 black;
            font-size: 1.2em;
            font-weight: bold;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="prop pillar-1" style="width: 60px; height: 200px; left: 150px; bottom: 20px;"></div>
        <div class="prop pillar-2" style="width: 80px; height: 160px; left: 450px; bottom: 20px;"></div>
        <div class="prop" style="width: 60px; height: 200px; left: 350px; bottom: 20px; background-image: url('pillar.png');"></div>

        <div class="block" style="left: 100px; bottom: 20px;"></div>
        <div class="block" style="left: 150px; bottom: 20px;"></div>
        <div class="block" style="left: 190px; bottom: 60px;"></div>

        <div class="platform platform-1" style="width: 150px; left: 250px; bottom: 120px;"></div>
        <div class="coin" data-value="1" style="left: 310px; bottom: 160px;"></div>

        <div class="platform platform-2" style="width: 120px; left: 500px; bottom: 220px;"></div>
        <div class="coin" data-value="5" style="left: 550px; bottom: 260px;"></div>
        
        <div class="platform" style="width: 150px; left: 300px; bottom: 120px;"></div>
        <div class="coin" data-value="1" style="left: 360px; bottom: 160px;"></div>

        <div class="platform" style="width: 100px; left: 550px; bottom: 200px;"></div>
        <div class="coin" data-value="5" style="left: 590px; bottom: 240px;"></div>

        <div id="home-screen">
            <h1>KiPriyo Jump</h1>
            <h3>Select Your Character</h3>
            <div>
                <button id="btn-lungiman" class="char-btn">Play as Lungiman</button>
                <button id="btn-chitra" class="char-btn">Play as Chitra</button>
            </div>
        </div>

        <div id="player"></div>
        <div id="enemy"></div> 
        <div id="score">Score: 0</div>
    </div>

    <script>
        // --- JavaScript for Game Logic ---
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const scoreDisplay = document.getElementById('score');
        const gameContainer = document.getElementById('game-container');
        const homeScreen = document.getElementById('home-screen');
        const coins = document.querySelectorAll('.coin');

        // Player Dimensions
        const pWidth = 32;
        const pHeight = 64;

        // Physics Variables
        const groundLevel = 20; 
        let playerX = 50;
        let playerY = groundLevel;
        let velocityX = 0;
        let velocityY = 0;
        const gravity = -0.8;      
        const jumpPower = 15;      
        const moveSpeed = 6;       
        let isGrounded = true;     
        let score = 0;
        let isGameOver = true; 

        // Enemy Variables
        let enemyX = 750;
        let enemySpeed = 3;
        let enemyDirection = -1; 

        // Animation Variables
        let walkFrame = 1;
        let frameCounter = 0;
        const animationSpeed = 5; 

        // Audio Assets
        const sfxJump = new Audio('jump.wav');
        const sfxCoin = new Audio('coin.wav');
        const sfxDeath = new Audio('gameover.wav');
        const bgm = new Audio('bgm.mp3');
        bgm.loop = true; 
        bgm.volume = 0.5; 

        let blockData = [];

        function updateHitboxes() {
            const allSolids = document.querySelectorAll('.block, .platform, .obstacle'); 
            blockData = Array.from(allSolids).map(solid => ({
                left: parseInt(solid.style.left),
                bottom: parseInt(solid.style.bottom),
                right: parseInt(solid.style.left) + solid.clientWidth, 
                top: parseInt(solid.style.bottom) + solid.clientHeight  
            }));
        }

        function spawnRandomObstacles(amount) {
            for (let i = 0; i < amount; i++) {
                const obs = document.createElement('div');
                obs.classList.add('obstacle');
                if (Math.random() > 0.5) {
                    obs.classList.add('obs-pot');
                } else {
                    obs.classList.add('obs-statue');
                }
                const randomX = Math.floor(Math.random() * 550) + 100;
                obs.style.left = `${randomX}px`;
                gameContainer.appendChild(obs);
            }
        }

        // Menu Selection Logic
        document.getElementById('btn-lungiman').addEventListener('click', () => {
            player.style.backgroundImage = "url('player_lungiman.png')";
            startGame();
        });

        document.getElementById('btn-chitra').addEventListener('click', () => {
            player.style.backgroundImage = "url('player_chitra.png')";
            startGame();
        });

        function startGame() {
            homeScreen.style.display = 'none'; 
            isGameOver = false;    
            spawnRandomObstacles(3); 
            updateHitboxes();
            bgm.play(); 
            requestAnimationFrame(updateGame); 
        }

        // Input Handling
        const keys = { right: false, left: false };

        document.addEventListener('keydown', (e) => {
            if (isGameOver) return; 

            if (e.code === 'ArrowRight') {
                keys.right = true;
                player.style.transform = 'scaleX(1)'; 
            } else if (e.code === 'ArrowLeft') {
                keys.left = true;
                player.style.transform = 'scaleX(-1)'; 
            }
            
            if (e.code === 'Space' && isGrounded) {
                velocityY = jumpPower;
                isGrounded = false;
                sfxJump.currentTime = 0; 
                sfxJump.play();
            }
        }); 

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'ArrowLeft') keys.left = false;
        });

        // The Game Loop
        function updateGame() {
            if (isGameOver) return; 

            // 1. X-AXIS MOVEMENT
            if (keys.right) velocityX = moveSpeed;
            else if (keys.left) velocityX = -moveSpeed;
            else velocityX = 0; 

            playerX += velocityX;
            if (playerX < 0) playerX = 0;
            if (playerX > gameContainer.clientWidth - pWidth) {
                playerX = gameContainer.clientWidth - pWidth;
            }

            for (let b of blockData) {
                if (playerX + pWidth > b.left && playerX < b.right && playerY + pHeight > b.bottom && playerY < b.top) {
                    if (velocityX > 0) playerX = b.left - pWidth; 
                    if (velocityX < 0) playerX = b.right;     
                }
            }

            // 2. Y-AXIS MOVEMENT
            velocityY += gravity; 
            playerY += velocityY;
            isGrounded = false; 

            for (let b of blockData) {
                if (playerX + pWidth > b.left && playerX < b.right && playerY + pHeight > b.bottom && playerY < b.top) {
                    if (velocityY < 0) { 
                        playerY = b.top;
                        velocityY = 0;
                        isGrounded = true;
                    } else if (velocityY > 0) { 
                        playerY = b.bottom - pHeight;
                        velocityY = 0;
                    }
                }
            }

            if (playerY <= groundLevel) {
                playerY = groundLevel;
                velocityY = 0;
                isGrounded = true;
            }

            player.style.left = `${playerX}px`;
            player.style.bottom = `${playerY}px`;

            // 3. ANIMATION STATE MACHINE
            const isChitra = player.style.backgroundImage.includes('chitra');
            const charPrefix = isChitra ? 'chitra' : 'lungiman';

            if (!isGrounded) {
                player.style.backgroundImage = `url('jump_${charPrefix}.png')`;
            } 
            else if (velocityX !== 0) {
                frameCounter++;
                if (frameCounter >= animationSpeed) {
                    walkFrame++; 
                    if (walkFrame > 4) walkFrame = 1; 
                    frameCounter = 0; 
                }
                player.style.backgroundImage = `url('walk_${walkFrame}_${charPrefix}.png')`;
            } 
            else {
                player.style.backgroundImage = `url('player_${charPrefix}.png')`;
                walkFrame = 1; 
            }

            // 4. ENEMY MOVEMENT
            enemyX += enemySpeed * enemyDirection;
            if (enemyX <= 0 || enemyX >= gameContainer.clientWidth - 40) {
                enemyDirection *= -1; 
            }
            enemy.style.left = `${enemyX}px`;

            const playerRect = player.getBoundingClientRect();
            const enemyRect = enemy.getBoundingClientRect();

            const hitEnemyX = playerRect.left < enemyRect.right && playerRect.right > enemyRect.left;
            const hitEnemyY = playerRect.top < enemyRect.bottom && playerRect.bottom > enemyRect.top;

            if (hitEnemyX && hitEnemyY) {
                isGameOver = true;
                player.style.opacity = '0.5'; 
                bgm.pause();
                sfxDeath.play();
                setTimeout(() => alert(`Game Over! You hit the textbooks. Score: ${score}. Refresh to try again.`), 50);
                return;
            }

            // 5. COIN COLLECTION
            coins.forEach(coin => {
                if (coin.style.display === 'none') return;
                const coinRect = coin.getBoundingClientRect();
                const hitCoinX = playerRect.left < coinRect.right && playerRect.right > coinRect.left;
                const hitCoinY = playerRect.top < coinRect.bottom && playerRect.bottom > coinRect.top;

                if (hitCoinX && hitCoinY) {
                    score += parseInt(coin.getAttribute('data-value') || '1');
                    scoreDisplay.textContent = `Score: ${score}`;
                    coin.style.display = 'none'; 
                    sfxCoin.currentTime = 0;
                    sfxCoin.play();
                }
            });

            requestAnimationFrame(updateGame);
        }
    </script>
</body>
</html>
